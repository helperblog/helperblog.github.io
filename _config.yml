title: "HelperBlog | Tech Tips & Tutorials"
description: "Practical guides on Jekyll, GitHub Pages, and web development with SEO optimization"
url: "https://helperblog.github.io"
baseurl: ""

lang: "en-IN"
timezone: "Asia/Kolkata"

markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 5
paginate_path: "/page:num/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-avatar
  - jekyll-mentions

author:
  name: "Mushaahid Raza"
  email: "your@email.com"
  twitter: "@yourhandle"
  github: "helperblog"

organization:
  name: "HelperBlog"
  url: "https://helperblog.github.io"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      author: "Mushaahid Raza"
      share: true
      schema_type: "BlogPosting"
      toc: true

kramdown:
  toc_levels: 1..3
  smart_quotes: lsquo,rsquo,ldquo,rdquo

sass:
  style: compressed

# Optional SEO image (won't display, just metadata)
seo:
  default_image: "https://via.placeholder.com/1200x630?text=HelperBlog"

# Analytics & Comments (optional)
google_analytics: ""
disqus_shortname: ""

# GitHub Pages doesn't allow these headers directly, this is reference only
security_headers:
  X-Frame-Options: "DENY"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"


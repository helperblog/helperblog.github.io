<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | escape }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {%- seo -%}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
      <p class="site-tagline">{{ site.description }}</p>
    </div>
  </header>

  <nav class="site-nav">
    <div class="container">
      <a href="{{ "/" | relative_url }}">Home</a>
      <a href="{{ "/about/" | relative_url }}">About</a>
      <a href="{{ "/contact/" | relative_url }}">Contact</a>
    </div>
  </nav>

  <main class="site-content container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Built with Jekyll & GitHub Pages.</p>
    </div>
  </footer>
</body>
</html>

---
layout: default
---

<div class="content">
  <h1>Welcome to HelperBlog</h1>
  <p class="intro">Your source for practical Jekyll, GitHub Pages, and SEO tips.</p>

  <div class="post-list">
    {% for post in site.posts %}
      <article class="post-card">
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        <p>{{ post.excerpt | strip_html | truncate: 150 }}</p>
      </article>
    {% endfor %}
  </div>
</div>
